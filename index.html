<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>你终于来了吗</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: radial-gradient(circle at 10% 20%, #0a0c12 0%, #030507 100%);
            color: #eef2ff;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1.5rem;
        }
        .container {
            max-width: 800px;
            width: 100%;
            background: rgba(18, 22, 35, 0.85);
            backdrop-filter: blur(12px);
            border-radius: 2rem;
            box-shadow: 0 25px 45px -12px rgba(0, 0, 0, 0.6), 0 0 0 1px rgba(255, 255, 255, 0.05);
            overflow: hidden;
        }
        .hero {
            background: linear-gradient(135deg, #1a1e2f, #0c0f1a);
            padding: 2rem 1.5rem 1.5rem;
            text-align: center;
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
        }
        .hero h1 { font-size: 1.9rem; font-weight: 700; background: linear-gradient(120deg, #c084fc, #a78bfa); -webkit-background-clip: text; background-clip: text; color: transparent; margin-bottom: 0.5rem; }
        .hero p { font-size: 0.9rem; opacity: 0.7; max-width: 500px; margin: 0 auto; }
        .progress-area { padding: 1rem 1.5rem 0; font-size: 0.85rem; color: #a0aec0; display: flex; justify-content: space-between; align-items: baseline; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .question-counter { font-weight: 500; background: rgba(255,255,255,0.05); padding: 0.25rem 0.75rem; border-radius: 40px; }
        .answered-status { font-size: 0.8rem; }
        .question-panel { padding: 2rem 1.8rem; min-height: 320px; display: flex; flex-direction: column; justify-content: center; }
        .question-text { font-size: 1.45rem; font-weight: 600; line-height: 1.4; margin-bottom: 2rem; color: #f1f5f9; }
        .options-list { display: flex; flex-direction: column; gap: 0.9rem; margin-bottom: 1.5rem; }
        .option-btn {
            background: rgba(30, 35, 55, 0.7); border: 1px solid rgba(255, 255, 255, 0.12); border-radius: 1.2rem;
            padding: 0.9rem 1.2rem; display: flex; align-items: center; cursor: pointer; transition: all 0.2s ease;
            color: #e2e8f0; font-weight: 500;
        }
        .option-btn:hover { background: rgba(55, 65, 90, 0.8); border-color: #a78bfa; transform: translateX(4px); }
        .option-btn.selected { background: linear-gradient(95deg, #5b21b6, #7c3aed); border-color: #c084fc; box-shadow: 0 4px 12px rgba(124, 58, 237, 0.3); color: white; }
        .option-btn .option-value { font-weight: 700; margin-right: 1rem; background: rgba(0,0,0,0.3); padding: 0.2rem 0.6rem; border-radius: 2rem; font-size: 0.85rem; }
        .option-btn .option-label { flex: 1; }
        .nav-buttons { display: flex; gap: 1rem; justify-content: space-between; margin-top: 1rem; padding: 0 1.8rem 2rem; }
        .btn { border: none; padding: 0.8rem 1.8rem; font-size: 0.95rem; font-weight: 600; border-radius: 2.5rem; cursor: pointer; font-family: inherit; background: #2d3348; color: #eef2ff; flex: 1; text-align: center; transition: 0.2s; }
        .btn-primary { background: linear-gradient(95deg, #6d28d9, #8b5cf6); color: white; box-shadow: 0 4px 12px rgba(109, 40, 217, 0.4); }
        .btn-primary:hover { background: linear-gradient(95deg, #5b21b6, #7c3aed); transform: scale(1.02); }
        .btn-secondary { background: rgba(45, 51, 72, 0.8); border: 1px solid #4a5568; }
        .btn-secondary:hover { background: #3b4259; transform: translateY(-2px); }
        .btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }
        .result-card { margin: 0 1.5rem 1.8rem 1.5rem; background: rgba(20, 25, 45, 0.9); backdrop-filter: blur(4px); border-radius: 1.5rem; padding: 1.5rem; border-left: 5px solid #8b5cf6; box-shadow: 0 8px 20px rgba(0, 0, 0, 0.4); }
        .result-title { font-size: 1.8rem; font-weight: 800; background: linear-gradient(120deg, #c084fc, #a78bfa); -webkit-background-clip: text; background-clip: text; color: transparent; margin-bottom: 0.5rem; }
        .result-desc { font-size: 1rem; line-height: 1.6; color: #cbd5e6; }
        .insight-text { margin-top: 1rem; padding: 0.75rem; background: rgba(139, 92, 246, 0.15); border-left: 3px solid #a78bfa; border-radius: 0.8rem; font-style: italic; }
        .error-message { color: #f87171; background: rgba(127, 29, 29, 0.3); margin: 0 1.5rem 1rem; padding: 0.75rem; border-radius: 2rem; text-align: center; font-weight: 500; border: 1px solid #f87171; }
        footer { text-align: center; font-size: 0.7rem; color: #5b6e8c; padding: 1rem 1.5rem 1.5rem; border-top: 1px solid rgba(255,255,255,0.05); margin-top: 0.5rem; }
        @media (max-width: 600px) { body { padding: 1rem; } .question-panel { padding: 1.5rem; } .question-text { font-size: 1.2rem; } .option-btn { padding: 0.7rem 1rem; } .nav-buttons { padding: 0 1.2rem 1.5rem; } }
    </style>
</head>
<body>
<div class="container" id="appContainer">
    <div class="hero"><h1>你的生命中缺少的是..？</h1><p>每页一题，直觉作答。</p></div>
    <div class="progress-area" id="progressArea"><span class="question-counter" id="questionCounter">第1 / 30题</span><span class="answered-status" id="answeredStatus">已答 0 / 30</span></div>
    <div id="questionPanel" class="question-panel"></div>
    <div class="nav-buttons"><button class="btn btn-secondary" id="prevBtn" disabled>◀ 上一题</button><button class="btn btn-primary" id="nextBtn">下一题 ▶</button></div>
    <div id="resultArea" style="display: none;"></div>
    <footer>去向何方？</footer>
</div>

<script>
    const questionsData = [
        { text: "你终于走了进来。", options: [

        { text: "你注意到墙上有一道很深的裂缝。", options: [
            { label: "用手指沿着裂缝滑动，感受它的纹理。", effects: { 属性2:1 } },
            { label: "心想这栋楼迟早要塌。", effects: { 属性4:1 } },
            { label: "这是很好的掩护。", effects: { 属性5:1 } },
            { label: "想找点东西把它填上。", effects: { 属性7:1 } }
        ] },
        { text: "是的。这里马上就什么都不剩了。", options: [
            { label: "“那就让它消失吧，我无所谓。”", effects: { 属性4:1 } },
            { label: "“我会站在远处，默默看着一切褪色。”", effects: { 属性5:1 } },
            { label: "“反正迟早要消失，没什么好留恋的。”", effects: { 属性7:1 } },
            { label: "“我会记住它最后的样子。”", effects: { 属性1:1 } }
        ] },
        { text: "好像跑题了。我们的主题是什么来着？", options: [
            { label: "“无所谓，继续聊下去就好。”", effects: { 属性6:1 } },
            { label: "“让我想想，我们之前说到哪了？”", effects: { 属性3:1 } },
            { label: "“我完全忘了...这让我有点慌张。”", effects: { 属性8:1 } },
            { label: "“跑题就跑题吧，何必在意。”", effects: { 属性5:1 } }
        ] },
        { text: "跟我来吧。你的面前出现了一扇半开的门，里面一片漆黑。", options: [
            { label: "毫不犹豫地走进去。", effects: { 属性7:1 } },
            { label: "先把门完全推开，观察片刻。", effects: { 属性2:1 } },
            { label: "把门关上，我要的不是这个。", effects: { 属性4:1 } },
            { label: "“你觉得里面有什么？”", effects: { 属性6:1 } }
        ] },
        { text: "门消失了。你的面前是一片荒野。那是一种什么样的场景？", options: [
            { label: "一片荒芜，但远方有地平线，我可以朝着一个方向走。", effects: { 属性7:1 } },
            { label: "空旷得让人想把自己也融入其中，什么都不想留下。", effects: { 属性8:1 } },
            { label: "荒草摇曳，风里有种熟悉的气息，让我想起某个遗忘的角落。", effects: { 属性8:1 } },
            { label: "像末日的舞台布景，这是你布置的吗？", effects: { 属性1:1 } }
        ] },
        { text: "有人递给你一杯酒。“这里好久没有人来了。”", options: [
            { label: "一饮而尽。", effects: { 属性4:1 } },
            { label: "礼貌地拒绝。", effects: { 属性7:1 } },
            { label: "拿在手里，但不喝。", effects: { 属性2:1 } },
            { label: "先闻一闻，再问是什么酒。", effects: { 属性3:1 } }
        ] },
        { text: "他邀请你去他家做客。刚刚进门，窗外就下起了大雨，雨滴猛烈地敲打着玻璃。", options: [
            { label: "感到一阵忧郁。", effects: { 属性8:1 } },
            { label: "觉得世界正在被清洗干净。", effects: { 属性6:1 } },
            { label: "计算着这雨要下多久。", effects: { 属性3:1 } },
            { label: "想冲进雨里。", effects: { 属性4:1 } }
        ] },
        { text: "你看到镜中的自己，眼神很陌生。", options: [

            { label: "移开视线，你不想看。", effects: { 属性5:1 } },
            { label: "对着镜子里的自己微笑。", effects: { 属性6:1 } },
            { label: "想一拳打碎镜子。", effects: { 属性4:1 } }
        ] },
        { text: "他问你：“你为什么不开心？”", options: [
            { label: "“我没有不开心。”", effects: { 属性5:1 } },
            { label: "“因为世界就是这样。”", effects: { 属性3:1 } },
            { label: "看着他的眼睛，认真地回答他。", effects: { 属性6:1 } },
            { label: "“你是谁？”", effects: { 属性1:1 } }
        ] },
        { text: "你的鞋底粘了一块口香糖。", options: [
            { label: "这就像我的人生。别给我安排这种情节。", effects: { 属性1:1 } },
            { label: "用力在地上蹭掉。", effects: { 属性7:1 } },
            { label: "无视它，继续走路。", effects: { 属性5:1 } },
            { label: "用纸包起来，扔进垃圾桶。", effects: { 属性3:1 } }
        ] },
        { text: "你发现口袋里有一张皱巴巴的纸条，上面写着一个地址。", options: [
            { label: "立刻动身去那个地址。", effects: { 属性7:1 } },
            { label: "努力回忆这地址是哪。", effects: { 属性2:1 } },
            { label: "把纸条扔掉。", effects: { 属性5:1 } },
            { label: "把它仔细叠好，收起来。", effects: { 属性1:1 } }
        ] },
        { text: "一个声音在你脑海里说：“你什么都做不好。”", options: [
            { label: "认同它：“你说得对。”", effects: { 属性8:1 } },
            { label: "反驳它：“闭嘴，我能行。”", effects: { 属性4:1 } },
            { label: "问它：“那你又是谁？”", effects: { 属性2:1 } },
            { label: "无视它，继续手头的事。", effects: { 属性7:1 } }
        ] },
        { text: "好了，暂停一下。你喜欢什么样的结局？", options: [
            { label: "大团圆，所有人得救。", effects: { 属性6:1 } },
            { label: "悲剧，让人永远铭记。", effects: { 属性8:1 } },
            { label: "“你安排的任何结局。”", effects: { 属性1:1 } },
            { label: "所有主角都死光了。", effects: { 属性4:1 } }
        ] },
        { text: "在路上，你看到一个醉汉躺在路边。", options: [
            { label: "走过去看看他是否还活着。", effects: { 属性6:1 } },
            { label: "这不关你的事。", effects: { 属性5:1 } },
            { label: "想到自己可能也会变成这样。", effects: { 属性8:1 } },
            { label: "踢他一脚，让他醒醒。", effects: { 属性4:1 } }
        ] },
        { text: "你认为“真相”是什么？", options: [
            { label: "真相是存在的，只是被隐藏了。", effects: { 属性3:1 } },
            { label: "“你在幕布后吗？”", effects: { 属性1:1 } },
            { label: "真相毫无意义，重要的是感受。", effects: { 属性8:1 } },
            { label: "你就是来找真相的。", effects: { 属性7:1 } }
        ] },
        { text: "一只猫从你脚边窜过。", options: [
            { label: "蹲下来，发出声音想引它过来。", effects: { 属性6:1 } },
            { label: "被吓了一跳。", effects: { 属性2:1 } },
            { label: "心想，猫比人好相处。", effects: { 属性5:1 } },
            { label: "无视它，继续走。", effects: { 属性7:1 } }
        ] },
        { text: "你觉得“记忆”像什么？", options: [
            { label: "一个充满宝箱，也充满陷阱的迷宫。", effects: { 属性3:1 } },
            { label: "一个可以随意改写的剧本。", effects: { 属性2:1 } },
            { label: "一块永不褪色的宝石。", effects: { 属性7:1 } },
            { label: "一个你再也回不去的故乡。", effects: { 属性8:1 } }
        ] },
        { text: "你最不能忍受的是什么？", options: [
            { label: "愚昧。", effects: { 属性3:1 } },
            { label: "背叛。", effects: { 属性4:1 } },
            { label: "无聊。", effects: { 属性8:1 } },
            { label: "失去控制。", effects: { 属性7:1 } }
        ] },
        { text: "你发现了吗？你手里有一把枪。", options: [
            { label: "检查弹夹，确保它能用。", effects: { 属性3:1 } },
            { label: "立刻扔掉，你不需要它。", effects: { 属性6:1 } },
            { label: "拿着它，感到一种安全感。", effects: { 属性5:1 } },
            { label: "对着天空开一枪，听听响声。", effects: { 属性4:1 } }
        ] },
        { text: "你认为是上帝在指引你吗？", options: [
            { label: "是的。", effects: { 属性6:1 } },
            { label: "不是。", effects: { 属性7:1 } },
            { label: "我信仰一个更抽象、更虚无的东西。", effects: { 属性2:1 } },
            { label: "这取决于你如何定义“指引”和“上帝”。", effects: { 属性3:1 } }

            { label: "这是灵感在撞击你的颅骨。", effects: { 属性3:1 } },
            { label: "这是世界在惩罚你。", effects: { 属性4:1 } },
            { label: "吃一片药，然后休息。", effects: { 属性7:1 } },

    const resultsMap = [
        { id: 0, name: "废墟之上的锚", 
          description: "你的灵魂被记忆的潮汐反复冲刷，你过于清晰地记得那些已经消逝的光影。你活在过去的余韵里，因为那里比现实更安全、更完整。你缺少的是——允许自己站在此刻的土地上，承认现在就是唯一真实的时间。你并非需要遗忘，而是需要学会：哀悼之后，仍然可以转身。",

          vector: { 属性4:2.2, 属性7:2.0, 属性5:1.0, 属性1:0.2, 属性2:0.3, 属性3:0.2, 属性8:0.1, 属性6:0.0 } },
        { id: 2, name: "灯罩", 
          description: "你是一团不设防的火，总想照亮所有黑暗，却忘了自己也会被风吹散。你过于热切地相信每一次善意，过度地交付自己。你缺少的是——承认有些人值得你退后一步，有些热情需要保留火种。不是冷漠，而是知道如何不让自己的火焰被轻易扑灭。",
          insight: "“光需要方向，也需要庇护；温暖他人之前，先护住自己的芯。”",
          vector: { 属性6:2.5, 属性7:1.5, 属性1:0.5, 属性2:0.5, 属性3:0.5, 属性4:0.3, 属性8:0.1, 属性5:0.1 } },
        { id: 3, name: "理性的裂隙", 
          description: "你习惯用逻辑解剖世界，用效率衡量一切。情感在你眼中是变量，是干扰项。你缺少的是——允许自己偶尔被情绪淹没，允许非理性的柔软。你是一座精准的灯塔，但灯塔不需要感受潮汐，而你需要。真正的清明，有时恰恰需要一点迷惘。",
          insight: "“精密机器也需要润滑剂，而那种润滑剂，叫做不为什么的温柔。”",
          vector: { 属性3:2.3, 属性5:1.8, 属性4:0.7, 属性7:0.5, 属性2:0.4, 属性1:0.2, 属性8:0.1, 属性6:0.0 } },
        { id: 4, name: "停下的钟摆", 
          description: "你的大脑是一台永动的推理机，每一个细节都被拆解成疑点。你寻找真相，却害怕真相最终指向你自己。你缺少的是——停下来，不再追问“为什么”。有些答案并不存在，有些问题本身就是陷阱。你需要的不是更多的线索，而是让焦灼的神经学会静默。",
          insight: "“不是所有迷宫都有出口，但你可以选择坐在原地，听风声。”",
          vector: { 属性2:2.3, 属性3:1.9, 属性4:0.6, 属性5:0.5, 属性8:0.3, 属性1:0.2, 属性7:0.1, 属性6:0.1 } },
        { id: 5, name: "泥泞中的种子", 
          description: "你拥有极好的品味，懂得欣赏一切消逝的美。你沉溺于枯萎的玫瑰、褪色的诗句，却迟迟不肯为明天种下一颗种子。你缺少的是——把手弄脏的勇气，去尝试不完美的事物，去拥抱粗粝的现实。你太善于审美失败，却忘了失败也是一种活过的证明。",
          insight: "“花可以凋零，但泥土永远值得再次播种。”",
          vector: { 属性8:2.4, 属性5:1.5, 属性2:1.0, 属性3:0.5, 属性1:0.3, 属性4:0.2, 属性7:0.1, 属性6:0.0 } },
        { id: 6, name: "别想那些了。看着我。", 
          description: "把手给我，让我带你离开。那些层层叠叠的思绪，今夜请暂且搁置。你不需要再证明什么，也不必寻找答案。此刻只是驻足，呼吸，感受有光落在你肩上。",
          insight: "我就在这里，从未离开。",
          vector: { 属性1:2.5, 属性2:1.2, 属性6:1.0, 属性3:0.5, 属性7:0.3, 属性8:0.3, 属性4:0.1, 属性5:0.1 } }
    ];

    let currentIndex = 0;
    let userAnswers = new Array(30).fill(null);
    const questionPanel = document.getElementById('questionPanel');
    const prevBtn = document.getElementById('prevBtn');
    const nextBtn = document.getElementById('nextBtn');
    const resultArea = document.getElementById('resultArea');
    const questionCounterSpan = document.getElementById('questionCounter');
    const answeredStatusSpan = document.getElementById('answeredStatus');
    const appContainer = document.getElementById('appContainer');
    const footerEl = document.querySelector('footer');

    function updateFooterByAnsweredCount(answeredCount) { if (footerEl) footerEl.innerText = answeredCount >= 15 ? '我就在这里。' : '去向何方？'; }
    function updateProgress() { 
        questionCounterSpan.innerText = `第${currentIndex+1} / 30题`; 
        const answeredCount = userAnswers.filter(a => a !== null).length;
        answeredStatusSpan.innerText = `已答 ${answeredCount} / 30`; 
        updateFooterByAnsweredCount(answeredCount);
    }
    function updateButtons() { prevBtn.disabled = (currentIndex === 0); nextBtn.innerText = (currentIndex === 29) ? '✨ 提交结果 ✨' : '下一题 ▶'; }
    function escapeHtml(str) { return str.replace(/[&<>]/g, m => ({ '&':'&amp;', '<':'&lt;', '>':'&gt;' }[m])); }
    function clearError() { document.querySelectorAll('.error-message').forEach(e => e.remove()); }
    function showError(msg) { clearError(); const errDiv = document.createElement('div'); errDiv.className = 'error-message'; errDiv.innerText = msg; appContainer.insertBefore(errDiv, document.querySelector('.nav-buttons')); }

    function renderCurrentQuestion() {
        const q = questionsData[currentIndex];
        const selectedIdx = userAnswers[currentIndex];
        let optionsHtml = '';
        q.options.forEach((opt, idx) => {
            const isSelected = (selectedIdx === idx);
            const selectedClass = isSelected ? 'selected' : '';
            if (currentIndex === 1 && idx === 0) {
                optionsHtml += `<div class="option-btn ${selectedClass}" data-opt-index="${idx}"><span class="option-value">${String.fromCharCode(65+idx)}</span><span class="option-label">${escapeHtml(opt.label)} <input type="text" id="nameInput" placeholder="输入你的名字" style="background:rgba(0,0,0,0.3); border:1px solid #a78bfa; border-radius:20px; padding:4px 8px; color:white; margin-left:8px; width:120px;" onclick="event.stopPropagation();"></span></div>`;
            } else {
                optionsHtml += `<div class="option-btn ${selectedClass}" data-opt-index="${idx}"><span class="option-value">${String.fromCharCode(65+idx)}</span><span class="option-label">${escapeHtml(opt.label)}</span></div>`;
            }
        });
        questionPanel.innerHTML = `<div class="question-text">${escapeHtml(q.text)}</div><div class="options-list">${optionsHtml}</div>`;
        document.querySelectorAll('.option-btn').forEach(btn => {
            btn.addEventListener('click', (e) => { if (e.target.tagName === 'INPUT') return; const idx = parseInt(btn.dataset.optIndex, 10); userAnswers[currentIndex] = idx; renderCurrentQuestion(); updateProgress(); });
        });
        updateProgress(); updateButtons();
    }

    function computeAttributeScores() {
        const scores = { 属性1:0, 属性2:0, 属性3:0, 属性4:0, 属性5:0, 属性6:0, 属性7:0, 属性8:0 };
        for (let i = 0; i < questionsData.length; i++) {
            const selected = userAnswers[i];
            if (selected === null) continue;
            const effects = questionsData[i].options[selected].effects;
            for (let [attr, val] of Object.entries(effects)) scores[attr] = (scores[attr] || 0) + val;
        }
        return scores;
    }

    function getMaxPossibleScores() {
        const maxScores = { 属性1:0, 属性2:0, 属性3:0, 属性4:0, 属性5:0, 属性6:0, 属性7:0, 属性8:0 };
        for (let q of questionsData) {
            for (let attr of Object.keys(maxScores)) {
                let maxInQ = 0;
                for (let opt of q.options) maxInQ = Math.max(maxInQ, opt.effects[attr] || 0);
                maxScores[attr] += maxInQ;
            }
        }
        return maxScores;
    }

    function getBestResult(scores, maxScores) {
        const norm = {};
        for (let attr in scores) norm[attr] = maxScores[attr] > 0 ? scores[attr] / maxScores[attr] : 0;
        let bestId = 0, bestScore = -Infinity;
        for (let res of resultsMap) {
            let dot = 0;
            for (let attr in res.vector) dot += (res.vector[attr] || 0) * (norm[attr] || 0);
            if (dot > bestScore) { bestScore = dot; bestId = res.id; }
        }
        return resultsMap[bestId];
    }

    function submitAndShowResult() {
        clearError();
        const missing = [];
        for (let i = 0; i < userAnswers.length; i++) if (userAnswers[i] === null) missing.push(i+1);
        if (missing.length) { 
            showError(`⚠️ 还有 ${missing.length} 题未作答 (题号: ${missing.slice(0,10).join(', ')}${missing.length>10?'...':''})，请完成全部题目。`); 
            const firstMissing = missing[0]-1; 
            if (firstMissing >=0) { currentIndex = firstMissing; renderCurrentQuestion(); updateButtons(); } 
            return; 
        }
        const rawScores = computeAttributeScores();
        const maxScores = getMaxPossibleScores();
        const result = getBestResult(rawScores, maxScores);
        const progressDiv = document.getElementById('progressArea');
        const navDiv = document.querySelector('.nav-buttons');
        const questionPanelDiv = document.getElementById('questionPanel');
        progressDiv.style.display = 'none'; questionPanelDiv.style.display = 'none'; navDiv.style.display = 'none';
        resultArea.style.display = 'block';
        resultArea.innerHTML = `<div class="result-card"><div class="result-title">${result.name}</div><div class="result-desc"><p style="margin-top: 12px;">${result.description}</p><div class="insight-text">${result.insight}</div></div><div style="margin-top: 1.5rem; text-align: center;"><button class="btn btn-secondary" id="restartBtn">🔄 重新测试</button></div></div>`;
        document.getElementById('restartBtn')?.addEventListener('click', () => { 
            userAnswers.fill(null); 
            currentIndex = 0; 
            resultArea.style.display = 'none'; 
            resultArea.innerHTML = ''; 
            progressDiv.style.display = 'flex'; 
            questionPanelDiv.style.display = 'flex'; 
            navDiv.style.display = 'flex'; 
            renderCurrentQuestion(); 
            updateProgress(); 
            clearError(); 
            window.scrollTo({ top: 0, behavior: 'smooth' }); 
        });
    }

    function goPrev() { if (currentIndex > 0) { currentIndex--; renderCurrentQuestion(); clearError(); } }
    function goNext() { 
        if (userAnswers[currentIndex] === null) { showError(`告诉我你的答案。`); return; } 
        clearError(); 
        if (currentIndex < 29) { currentIndex++; renderCurrentQuestion(); } 
        else if (currentIndex === 29) submitAndShowResult(); 
    }

    function init() {
        renderCurrentQuestion(); 
        prevBtn.addEventListener('click', goPrev); 
        nextBtn.addEventListener('click', goNext); 
        updateProgress();
    }
    init();
</script>
</body>
</html>
